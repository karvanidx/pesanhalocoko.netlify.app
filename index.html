<!DOCTYPE html>
<html lang="id" class="antialiased text-slate-900 bg-[#E2E8F0]">
<head>
    <!-- 1. TECHNICAL SEO & META CHARSET -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pesan HaloCoko - UnOfficial Order Manager</title>
    
    <!-- 2. PRIMARY SEO ON-PAGE -->
    <meta name="description" content="Aplikasi Order Manager HaloCoko unofficial untuk memudahkan agen/toko dalam merekap pesanan produk es krim secara otomatis dan akurat.">
    <meta name="keywords" content="HaloCoko, order manager, pesan es krim, aplikasi agen es krim, SuMiCo Milo, JoyCup, es krim box">
    <meta name="author" content="Ervan Kurniawan">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://pesanhalocoko.netlify.app/">
    
    <!-- 3. OPEN GRAPH / SOCIAL MEDIA (Untuk Share ke WhatsApp/Telegram) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pesanhalocoko.netlify.app/">
    <meta property="og:title" content="Pesan HaloCoko - Order Manager">
    <meta property="og:description" content="Bikin format pesanan es krim HaloCoko hanya dalam hitungan detik. Tanpa ribet, langsung copy-paste!">
    <meta property="og:image" content="https://pesanhalocoko.netlify.app/og-image.png">
    <meta property="og:locale" content="id_ID">

    <!-- 4. PWA / MOBILE THEME SEO -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F8FAFC">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- 5. SCHEMA.ORG / STRUCTURED DATA (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "HaloCoko Order Manager",
      "url": "https://pesanhalocoko.netlify.app/",
      "description": "Aplikasi rekapitulasi dan pemesanan produk es krim HaloCoko khusus agen.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "All",
      "author": {
        "@type": "Person",
        "name": "Ervan Kurniawan"
      }
    }
    </script>

    <!-- Tailwind & Alpine JS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        .app-canvas {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100dvh;
            background-color: #F8FAFC; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        *:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }

        /* UX FIX: Mengunci scroll di belakang modal (Background Scroll Lock) */
        body:has(dialog[open]) {
            overflow: hidden;
            touch-action: none;
        }

        /* Modern Dialog Styling */
        dialog {
            /* Pastikan posisi fixed dan sentral di tengah layar */
            position: fixed;
            inset: 0;
            margin: auto;
            /* Batasi tinggi modal pada HP agar tidak tumpah dan bisa discroll isinya */
            max-height: 85dvh; 
            overflow-y: auto;
            
            opacity: 0;
            transform: translateY(16px) scale(0.98);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            transition-behavior: allow-discrete;
            border: none;
        }
        
        dialog[open] {
            opacity: 1;
            transform: translateY(0) scale(1);
            @starting-style { opacity: 0; transform: translateY(16px) scale(0.98); }
        }
        
        dialog::backdrop {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
            transition-behavior: allow-discrete;
        }
        
        dialog[open]::backdrop {
            opacity: 1;
            @starting-style { opacity: 0; }
        }

        .item-row.is-active { background-color: #F0F9FF; }
        .item-row { transition: background-color 0.2s ease; }
    </style>
</head>
<body>

    <div x-data="app()" x-init="init()" class="app-canvas pb-40 relative">
        
        <!-- Header Semantic -->
        <header class="pt-6 pb-4 px-6 bg-[#F8FAFC]/90 sticky top-0 z-20 flex justify-between items-center backdrop-blur-md">
            <div>
                <!-- Menggunakan Heading hirarki yang baik untuk SEO -->
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">HaloCoko.</h1>
                <h2 class="text-sm font-medium text-slate-500">Order Manager</h2>
            </div>
            
            <button @click="$refs.infoModal.showModal()" aria-label="Lihat Informasi Author" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-slate-200 text-slate-600 hover:text-slate-900 active:scale-90 transition-transform">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto no-scrollbar px-5 py-2 space-y-8">
            
            <!-- Store Form -->
            <section aria-labelledby="form-section-title" class="space-y-4">
                <h2 id="form-section-title" class="sr-only">Form Identitas Toko</h2>
                <div class="relative">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5 ml-1">Toko & Alamat</label>
                    <div class="bg-white rounded-3xl p-1 shadow-sm border border-slate-200 overflow-hidden">
                        <input type="text" x-model="store.name" @input="save()" aria-label="Masukkan Nama Toko" placeholder="Nama Toko" class="w-full bg-transparent px-4 pt-3 pb-2 text-slate-900 font-semibold focus:outline-none placeholder:text-slate-300 border-b border-slate-100">
                        <textarea x-model="store.address" @input="save()" aria-label="Masukkan Alamat Lengkap" rows="2" placeholder="Detail Alamat Pengiriman" class="w-full bg-transparent px-4 pt-2 pb-3 text-slate-600 text-sm focus:outline-none placeholder:text-slate-300 resize-none"></textarea>
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5 ml-1">Tanggal Pesanan</label>
                    <input type="date" x-model="store.date" @input="save()" aria-label="Pilih Tanggal Pesanan" class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-3 text-slate-900 font-semibold focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-sm transition-all appearance-none">
                </div>
            </section>

            <hr class="border-slate-200">

            <!-- Products Catalog -->
            <section aria-labelledby="katalog-produk-title">
                <div class="flex justify-between items-end mb-4 px-1">
                    <h2 id="katalog-produk-title" class="text-xl font-extrabold text-slate-900">Katalog Produk</h2>
                    <span class="text-sm font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md" aria-live="polite" x-show="totalDus > 0" x-text="`${totalDus} Dus`"></span>
                </div>

                <!-- Product Loop -->
                <template x-for="group in productGroups" :key="group.price">
                    <div class="mb-6">
                        <!-- Semantic header untuh kelompok harga -->
                        <h3 class="text-xs font-bold tracking-widest uppercase text-slate-400 mb-3 ml-2">Harga Rp <span x-text="group.price"></span></h3>
                        
                        <div class="bg-white border border-slate-200 shadow-sm rounded-3xl overflow-hidden">
                            <template x-for="(item, index) in group.items" :key="item.id">
                                <div>
                                    <div class="item-row flex items-center justify-between p-4" :class="{'is-active': item.qty > 0}">
                                        
                                        <div class="flex-1 pr-4">
                                            <span class="font-semibold text-[15px]" :class="item.qty > 0 ? 'text-blue-900' : 'text-slate-800'" x-text="item.name"></span>
                                        </div>

                                        <!-- Stepper -->
                                        <div class="flex items-center gap-3">
                                            <button @click="adjust(item.id, -1)" 
                                                    :aria-label="`Kurangi 1 dus ${item.name}`"
                                                    class="w-8 h-8 flex items-center justify-center rounded-full transition-all duration-200 active:scale-90"
                                                    :class="item.qty > 0 ? 'bg-white text-slate-600 border border-slate-300 shadow-sm hover:border-slate-400' : 'opacity-30 bg-slate-100 text-slate-400 cursor-default'"
                                                    :disabled="item.qty === 0">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
                                            </button>
                                            
                                            <span class="w-4 text-center font-bold font-mono text-[16px] select-none" 
                                                  :aria-label="`${item.qty} dus dipesan`"
                                                  :class="item.qty > 0 ? 'text-slate-900' : 'text-slate-300'" 
                                                  x-text="item.qty"></span>
                                            
                                            <button @click="adjust(item.id, 1)" 
                                                    :aria-label="`Tambah 1 dus ${item.name}`"
                                                    class="w-8 h-8 flex items-center justify-center rounded-full transition-all duration-200 active:scale-90"
                                                    :class="item.qty > 0 ? 'bg-blue-600 text-white shadow-md shadow-blue-500/30' : 'bg-slate-800 text-white shadow-sm hover:bg-slate-700'">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div x-show="index !== group.items.length - 1" class="h-px bg-slate-100 ml-4"></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </section>

            <!-- Reset Action -->
            <div class="pt-2 flex justify-center">
                <button @click="clear()" x-show="totalDus > 0" class="flex items-center gap-2 text-[13px] font-bold text-slate-400 hover:text-red-500 transition-colors bg-white px-5 py-2.5 rounded-full shadow-sm border border-slate-200 active:scale-95">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    Hapus Seluruh Pesanan
                </button>
            </div>
            
        </main>

        <!-- Floating Button Bottom -->
        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[480px] px-6 z-40 pointer-events-none">
            <button @click="generate()" 
                    aria-live="polite"
                    :disabled="totalDus < 6"
                    class="pointer-events-auto w-full h-14 rounded-full font-bold text-[15px] flex items-center justify-center gap-2 transition-all duration-300"
                    :class="totalDus >= 6 
                        ? 'bg-slate-900 text-white shadow-[0_12px_24px_rgba(15,23,42,0.4)] active:scale-[0.97]' 
                        : 'bg-white text-slate-400 border border-slate-200 shadow-2xl cursor-not-allowed'">
                <template x-if="totalDus >= 6">
                    <div class="flex items-center gap-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        Buat Pesanan (<span x-text="`${totalDus} Dus`"></span>)
                    </div>
                </template>
                <template x-if="totalDus < 6">
                    <div class="flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                        <span x-text="totalDus === 0 ? 'Pilih min. 6 Dus' : `Kurang ${6 - totalDus} Dus lagi`"></span>
                    </div>
                </template>
            </button>
        </div>

        <!-- Result Modal (Fixed di Center, Anti-Scroll Body) -->
        <dialog id="result-modal" x-ref="modal" @click="if($event.target === $el) $el.close()" class="w-[90%] max-w-sm rounded-3xl shadow-2xl p-0 bg-white m-auto">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-3xl sticky top-0 z-10">
                <h2 class="font-extrabold text-slate-900 text-lg">Format Teks</h2>
                <button aria-label="Tutup Format" @click="$refs.modal.close()" class="text-slate-400 bg-white hover:text-slate-800 hover:bg-slate-100 p-2 rounded-full active:scale-90 transition-all border border-slate-200 shadow-sm">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <div class="p-5">
                <!-- Textarea buat naruh format copy (dibikin gampang select & A11y support) -->
                <textarea readonly aria-label="Teks rekap pesanan, klik untuk manual select" x-model="result" class="w-full h-64 bg-slate-50 border border-slate-200 rounded-xl p-4 text-[13px] font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 resize-none leading-relaxed"></textarea>
            </div>

            <div class="px-5 pb-5 pt-0">
                <button aria-live="assertive" @click="copy()" class="w-full h-12 rounded-xl font-bold text-white transition-all active:scale-95 flex justify-center items-center gap-2 shadow-md"
                        :class="copied ? 'bg-emerald-600' : 'bg-blue-600'">
                    <template x-if="!copied">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    </template>
                    <template x-if="copied">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </template>
                    <span x-text="copied ? 'Berhasil disalin!' : 'Salin Text'"></span>
                </button>
            </div>
        </dialog>

        <!-- Credit/Info Modal (Fixed di Center) -->
        <dialog id="info-modal" x-ref="infoModal" @click="if($event.target === $el) $el.close()" class="w-[85%] max-w-sm rounded-3xl shadow-2xl p-0 bg-white m-auto overflow-hidden relative">
            
            <button aria-label="Tutup Informasi" @click="$refs.infoModal.close()" class="absolute top-4 right-4 z-10 text-slate-400 bg-white/50 backdrop-blur-md hover:text-slate-800 hover:bg-white p-2 rounded-full active:scale-90 transition-all shadow-sm">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>

            <div class="p-8 pb-6 text-center bg-slate-50 flex flex-col items-center">
                <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white mb-4 rotate-3 shadow-lg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
                </div>
                <h2 class="font-extrabold text-slate-900 text-xl tracking-tight">Ervan Kurniawan</h2>
                <p class="text-[13px] font-semibold text-slate-500 mt-1">Software Engineer</p>
            </div>
            
            <div class="p-6 bg-white space-y-3 border-t border-slate-100">
                <a href="https://t.me/karvanidx" target="_blank" rel="noopener" class="w-full h-12 flex items-center justify-center gap-2 bg-[#F0F9FF] text-[#0284C7] rounded-xl font-bold text-sm active:scale-95 transition-transform border border-[#E0F2FE]">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    Chat via Telegram
                </a>
                <a href="https://trakteer.id/ervankurniawan41" target="_blank" rel="noopener" class="w-full h-12 flex items-center justify-center gap-2 bg-[#FEF2F2] text-[#DC2626] rounded-xl font-bold text-sm active:scale-95 transition-transform border border-[#FEE2E2]">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                    Dukung di Trakteer
                </a>
            </div>
        </dialog>

    </div>

    <!-- Application JS Logic -->
    <script>
        const initialDB = [
            { id: 1, name: 'SuMiCo Milo', price: 2000, qty: 0 },
            { id: 2, name: 'SuTaCo Taro', price: 2000, qty: 0 },
            { id: 3, name: 'SuKoCo Kopi', price: 2000, qty: 0 },
            { id: 4, name: 'Yogurt Krispi', price: 2000, qty: 0 },
            { id: 5, name: 'KastilEs Cokelat', price: 2000, qty: 0 },
            { id: 6, name: 'KastilEs Yogurt', price: 2000, qty: 0 },
            { id: 7, name: 'KastilEs Teh', price: 2000, qty: 0 },
            { id: 8, name: 'KastilEs Gula Kelapa', price: 2000, qty: 0 },
            { id: 9, name: 'KastilEs Kopi', price: 2000, qty: 0 },
            { id: 10, name: 'KastilEs Semangka Nanas', price: 2000, qty: 0 },
            { id: 11, name: 'KastilEs Melon Anggur', price: 2000, qty: 0 },
            { id: 12, name: 'JoyCup Cokelat', price: 5000, qty: 0 },
            { id: 13, name: 'HaloCookies', price: 5000, qty: 0 },
            { id: 14, name: 'HaloChoco', price: 5000, qty: 0 },
            { id: 15, name: '143 Cup', price: 3000, qty: 0 },
            { id: 16, name: 'KaKaKres Cokelat', price: 3000, qty: 0 },
            { id: 17, name: 'PisCok Krispi', price: 3000, qty: 0 },
            { id: 18, name: 'Tiger Choco', price: 3000, qty: 0 },
            { id: 19, name: 'Red Zebra Choco', price: 3000, qty: 0 },
            { id: 20, name: '23º Choco Cone', price: 4000, qty: 0 },
            { id: 21, name: 'Fantasy Almond', price: 4000, qty: 0 },
            { id: 22, name: 'Fantasy Caramel Malt', price: 4000, qty: 0 },
            { id: 23, name: 'Tiramisu Cookies', price: 4000, qty: 0 },
        ];

        document.addEventListener('alpine:init', () => {
            Alpine.data('app', () => ({
                store: {
                    name: '', address: '', date: new Date().toISOString().split('T')[0]
                },
                items: JSON.parse(JSON.stringify(initialDB)),
                result: '',
                copied: false,

                init() {
                    const cache = localStorage.getItem('hc_app_v5_final');
                    if (cache) {
                        try {
                            const { store, items } = JSON.parse(cache);
                            if(store) Object.assign(this.store, store);
                            if(items) this.items = this.items.map(p => {
                                const matched = items.find(i => i.id === p.id);
                                return matched ? {...p, qty: matched.qty} : p;
                            });
                        } catch(e) {}
                    }
                },

                save() {
                    localStorage.setItem('hc_app_v5_final', JSON.stringify({
                        store: { name: this.store.name, address: this.store.address },
                        items: this.items
                    }));
                },

                clear() {
                    if(confirm('Reset daftar keranjang belanja? (Nama dan Alamat toko tidak terhapus)')) {
                        this.items = JSON.parse(JSON.stringify(initialDB));
                        this.save();
                    }
                },

                adjust(id, val) {
                    if (navigator.vibrate) navigator.vibrate(10);
                    const idx = this.items.findIndex(p => p.id === id);
                    if (idx !== -1) {
                        let res = this.items[idx].qty + val;
                        this.items[idx].qty = res < 0 ? 0 : res;
                        this.save();
                    }
                },

                get totalDus() {
                    return this.items.reduce((acc, el) => acc + el.qty, 0);
                },

                get productGroups() {
                    const map = this.items.reduce((acc, el) => {
                        if (!acc[el.price]) acc[el.price] = [];
                        acc[el.price].push(el);
                        return acc;
                    }, {});
                    
                    return Object.keys(map).sort((a,b)=>a-b).map(k => ({
                        price: k,
                        items: map[k]
                    }));
                },

                generate() {
                    if(this.totalDus < 6) return;
                    
                    const d = new Date(this.store.date);
                    const dFmt = d.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric'});

                    let txt = `HaloCoko Order\n=================\n\n`;
                    txt += `Toko   : ${this.store.name || '-'}\n`;
                    txt += `Alamat : ${this.store.address || '-'}\n`;
                    txt += `Waktu  : ${dFmt}\n\n`;
                    txt += `*List Produk:*\n`;

                    let num = 1;
                    this.items.filter(i => i.qty > 0).forEach(i => {
                        txt += `${num}. ${i.name} = ${i.qty} Dus\n`;
                        num++;
                    });

                    txt += `\n*TOTAL: ${this.totalDus} Dus*`;

                    this.result = txt;
                    this.copied = false;
                    this.$refs.modal.showModal();
                },

                async copy() {
                    try {
                        await navigator.clipboard.writeText(this.result);
                        this.copied = true;
                        if (navigator.vibrate) navigator.vibrate(20);
                        setTimeout(() => this.copied = false, 2500);
                    } catch(e) {
                        alert('Gagal menyalin. Silakan seleksi teks pada area abu-abu dan copy manual.');
                    }
                }
            }));
        });
        
        // Register PWA Service Worker for Offline Capabilities
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.error));
        }
    </script>
</body>
</html>
